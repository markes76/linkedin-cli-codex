name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Pack npm tarball
        run: npm pack

      - name: Package LinkedIn skill
        run: |
          mkdir -p release-skill/linkedin-cli-skill
          cp docs/skill.md release-skill/linkedin-cli-skill/linkedin-cli.md
          cd release-skill
          zip -r ../linkedin-skill.zip linkedin-cli-skill

      - name: Create GitHub release with assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linkedin-cli-*.tgz
            linkedin-skill.zip

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
